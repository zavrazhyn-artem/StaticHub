[PHP]
; Upload limits
post_max_size       = 50M
upload_max_filesize = 50M

; Security
expose_php = Off

; Error handling – log errors, never display them
display_errors   = Off
display_startup_errors = Off
log_errors       = On
error_reporting  = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Timezone (override per-app in .env via Laravel config)
date.timezone = UTC

; Session
session.cookie_secure   = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax

; OPcache – tuned for production immutable deployments
[opcache]
opcache.enable                 = 1
opcache.enable_cli             = 0
opcache.memory_consumption     = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 20000
opcache.revalidate_freq        = 0
; Disable stat checks – files don't change at runtime (baked into image)
opcache.validate_timestamps    = 0
opcache.save_comments          = 1
opcache.fast_shutdown          = 1
