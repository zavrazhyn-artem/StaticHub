; Replaces the default www pool config
[www]
user  = www-data
group = www-data

; Listen on TCP socket for Docker container-to-container comms
listen = 9000

; Dynamic process management
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
; Recycle workers to prevent memory creep
pm.max_requests      = 500

; Timeouts
request_terminate_timeout = 120s

; Log to stderr so Docker captures it
php_admin_value[error_log]  = /dev/stderr
php_admin_flag[log_errors]  = on

; OPcache is shared across workers – no per-pool override needed
