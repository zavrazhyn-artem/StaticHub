; -----------------------------------------------------------------------
; Compile queue – CPU-bound JSON/DTO building. Single worker keeps CPU
; predictable; ShouldBeUnique guarantees one compile per character at a time.
; -----------------------------------------------------------------------
[program:queue-compile]
command=php -d memory_limit=512M artisan queue:work redis
    --queue=compile
    --sleep=3
    --tries=3
    --backoff=30
    --timeout=60
    --memory=512
    --max-jobs=500
    --max-time=3600
directory=/var/www/html
user=www-data
numprocs=1
process_name=%(program_name)s_%(process_num)02d
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; -----------------------------------------------------------------------
; AI queue – Gemini analysis. Single worker to avoid simultaneous large
; prompt assemblies; ProcessRaidAnalysisJob is ShouldBeUnique per report.
; --timeout bumped to 1200 to match ProcessRaidAnalysisJob::$timeout.
; -----------------------------------------------------------------------
[program:queue-ai]
command=php -d memory_limit=1024M artisan queue:work redis
    --queue=ai
    --sleep=3
    --tries=2
    --backoff=60
    --timeout=1200
    --memory=1024
    --max-jobs=50
    --max-time=7200
directory=/var/www/html
user=www-data
numprocs=1
process_name=%(program_name)s_%(process_num)02d
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

