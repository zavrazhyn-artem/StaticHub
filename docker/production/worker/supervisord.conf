[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

; -----------------------------------------------------------------------
; Blizzard API queue – 2 workers. ShouldBeUnique + RateLimited on the
; bnet-api bucket prevents duplicate/runaway fetches; lower concurrency
; trades throughput for CPU/RAM stability.
; -----------------------------------------------------------------------
[program:queue-bnet]
command=php -d memory_limit=256M artisan queue:work redis
    --queue=bnet
    --sleep=3
    --tries=3
    --backoff=60
    --timeout=120
    --memory=256
    --max-jobs=500
    --max-time=3600
directory=/var/www/html
user=www-data
numprocs=2
process_name=%(program_name)s_%(process_num)02d
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

