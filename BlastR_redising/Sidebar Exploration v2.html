<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<title>BlastR · Sidebar v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; height:100%; background:#f0eee9; font-family:'Inter', system-ui, sans-serif; color:#2a251f; }
  * { box-sizing: border-box; }
  .ms { font-family:'Material Symbols Rounded'; font-weight:500; font-style:normal; line-height:1; vertical-align:middle; -webkit-font-feature-settings:'liga'; font-feature-settings:'liga'; }
  .noscroll::-webkit-scrollbar { display:none; }
  .noscroll { scrollbar-width:none; }
  @keyframes pulse {
    0%,100% { transform:scale(1); opacity:1; }
    50% { transform:scale(1.3); opacity:0.55; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" data-presets="react">

const T = {
  bg:'#0e0e10', surface:'#19191c', surfaceHigh:'#222226', surfaceLow:'#131315', surfaceVar:'#262528',
  primary:'#4fd3f7', primaryDim:'#3cc5e9', secondary:'#fa7902', tertiary:'#fcf266',
  error:'#ff6e84', success:'#39FF14',
  textHi:'#f9f5f8', textMid:'#adaaad', textLow:'#767577',
  border:'rgba(255,255,255,0.06)', borderStrong:'rgba(255,255,255,0.12)',
};

// ───── shared blocks ─────
function Logo({ size=32, mark='B' }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:8,
      background:`linear-gradient(135deg, ${T.primary} 0%, #14b2d5 100%)`,
      display:'grid', placeItems:'center', color:'#003040',
      fontWeight:800, fontSize:size*0.55, fontFamily:'Inter',
      boxShadow:'0 0 0 1px rgba(79,211,247,0.3), 0 6px 18px rgba(79,211,247,0.18)',
      letterSpacing:'-0.02em'
    }}>{mark}</div>
  );
}

function Tooltip({ children, text, side='right' }) {
  const [show, setShow] = React.useState(false);
  if (!text) return children;
  const pos = side === 'right'
    ? { left:'calc(100% + 10px)', top:'50%', transform:'translateY(-50%)' }
    : side === 'top'
    ? { bottom:'calc(100% + 8px)', left:'50%', transform:'translateX(-50%)' }
    : { right:'calc(100% + 10px)', top:'50%', transform:'translateY(-50%)' };
  return (
    <span style={{ position:'relative', display:'inline-flex' }} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
      {children}
      {show && (
        <span style={{
          position:'absolute', ...pos,
          background:'#000', color:T.textHi, padding:'4px 8px', borderRadius:6, fontSize:11,
          whiteSpace:'nowrap', zIndex:99, border:`1px solid ${T.borderStrong}`, fontWeight:500
        }}>{text}</span>
      )}
    </span>
  );
}

function Avatar({ size=32, color='#FF7C0A', initial='Z' }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%',
      background:`linear-gradient(135deg, ${color}66, ${color}22)`,
      border:`1.5px solid ${color}aa`,
      display:'grid', placeItems:'center', color, fontSize:size*0.42, fontWeight:700, flexShrink:0
    }}>{initial}</div>
  );
}

const NAV = [
  { i:'space_dashboard', l:'Огляд' },
  { i:'groups',          l:'Склад',          badge:{type:'count', v:3, c:T.primary} },
  { i:'event',           l:'Розклад',        badge:{type:'next', v:'2д 7г', c:T.tertiary} },
  { i:'sports_esports',  l:'Boss Planner' },
  { i:'savings',         l:'Скарбниця',      badge:{type:'alert', c:T.error} },
  { i:'analytics',       l:'Аналітика' },
  { i:'shield',          l:'Екіпіровка',     badge:{type:'count', v:2, c:T.secondary} },
];

// Reusable rounded countdown widget (B-style refined)
function CountdownWidget({ rounded=true }) {
  const r = rounded ? 12 : 6;
  return (
    <div style={{
      borderRadius:r, padding:'12px 14px',
      background:`linear-gradient(135deg, rgba(79,211,247,0.10), rgba(79,211,247,0.02) 70%)`,
      border:`1px solid rgba(79,211,247,0.20)`,
      position:'relative', overflow:'hidden'
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
        <span style={{ width:6, height:6, borderRadius:'50%', background:T.success,
          boxShadow:`0 0 0 3px rgba(57,255,20,0.18)` }}></span>
        <span style={{ fontSize:9, color:T.textLow, letterSpacing:'0.14em', fontWeight:700 }}>СТАТІК</span>
      </div>
      <div style={{ fontSize:14, fontWeight:800, color:T.textHi, lineHeight:1.15 }}>Характерники</div>
      <div style={{ fontSize:10, color:T.primary, marginTop:2, fontWeight:600 }}>Mythic Progression · 2/9</div>

      <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between',
        marginTop:10, paddingTop:10, borderTop:`1px solid ${T.border}` }}>
        <div>
          <div style={{ fontSize:8, color:T.textLow, letterSpacing:'0.14em', fontWeight:700 }}>NEXT RAID</div>
          <div style={{ fontFamily:'JetBrains Mono', fontWeight:800, fontSize:14, color:T.tertiary, lineHeight:1 }}>02:07:11</div>
        </div>
        <button style={{ padding:'6px 11px', borderRadius:rounded?20:5,
          background:T.tertiary, border:'none', color:'#1a1a00',
          fontSize:9.5, fontWeight:800, letterSpacing:'0.06em', cursor:'pointer' }}>RSVP</button>
      </div>
    </div>
  );
}

// Footer buttons grid (Discord, Patreon, Feedback, Help, etc)
function FooterButtons({ rounded=true, layout='grid', items }) {
  const r = rounded ? 10 : 5;
  if (layout === 'inline') {
    return (
      <div style={{ display:'flex', gap:6 }}>
        {items.map((it,i)=>(
          <Tooltip key={i} text={it.l} side="top">
            <button style={{
              flex:1, padding:'9px', borderRadius:r,
              background:`${it.c}10`, border:`1px solid ${it.c}30`,
              color:it.c, cursor:'pointer', display:'grid', placeItems:'center',
              transition:'all .15s'
            }}
            onMouseEnter={e=>{ e.currentTarget.style.background = `${it.c}22`; }}
            onMouseLeave={e=>{ e.currentTarget.style.background = `${it.c}10`; }}>
              <span className="ms" style={{ fontSize:16 }}>{it.i}</span>
            </button>
          </Tooltip>
        ))}
      </div>
    );
  }
  // grid 2x2 etc
  return (
    <div style={{ display:'grid', gridTemplateColumns:`repeat(${Math.min(items.length, 4)}, 1fr)`, gap:6 }}>
      {items.map((it,i)=>(
        <Tooltip key={i} text={it.l} side="top">
          <button style={{
            padding:'10px 6px', borderRadius:r,
            background:`${it.c}10`, border:`1px solid ${it.c}25`,
            color:it.c, cursor:'pointer', display:'flex', flexDirection:'column',
            alignItems:'center', gap:4, transition:'all .15s', width:'100%'
          }}
          onMouseEnter={e=>{ e.currentTarget.style.background = `${it.c}1f`; e.currentTarget.style.borderColor = `${it.c}44`; }}
          onMouseLeave={e=>{ e.currentTarget.style.background = `${it.c}10`; e.currentTarget.style.borderColor = `${it.c}25`; }}>
            <span className="ms" style={{ fontSize:18 }}>{it.i}</span>
            <span style={{ fontSize:8.5, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase' }}>{it.s}</span>
          </button>
        </Tooltip>
      ))}
    </div>
  );
}

// User card (rich, B-style with status dot)
function UserCard({ rounded=true, compact=false }) {
  const r = rounded ? 12 : 6;
  return (
    <div style={{
      padding: compact ? '10px 12px' : '12px 14px',
      borderRadius:r, background:T.surface, border:`1px solid ${T.border}`,
      display:'flex', alignItems:'center', gap:10, cursor:'pointer',
      transition:'background .15s'
    }}
    onMouseEnter={e=>e.currentTarget.style.background = T.surfaceHigh}
    onMouseLeave={e=>e.currentTarget.style.background = T.surface}>
      <div style={{ position:'relative' }}>
        <Avatar size={compact?28:34} color="#FF7C0A" initial="Z"/>
        <span style={{ position:'absolute', bottom:-2, right:-2, width:11, height:11, borderRadius:'50%',
          background:T.success, border:`2px solid ${T.surface}` }}></span>
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:5 }}>
          <span style={{ fontSize:13, fontWeight:800, color:'#FF7C0A',
            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>Zavrikk</span>
          <Tooltip text="Owner — повний контроль">
            <span style={{ fontSize:11, color:T.tertiary, cursor:'help' }}>★</span>
          </Tooltip>
        </div>
        <div style={{ fontSize:10, color:T.textMid, fontWeight:500 }}>Druid · 281 ilvl</div>
      </div>
      <span className="ms" style={{ fontSize:18, color:T.textLow }}>expand_more</span>
    </div>
  );
}

// Nav row (rounded MD3 pill)
function NavRow({ it, active, rounded=true }) {
  const r = rounded ? 999 : 6;
  return (
    <div style={{
      display:'flex', alignItems:'center', gap:12,
      padding: rounded ? '9px 14px' : '10px 12px',
      borderRadius:r,
      background: active ? 'rgba(79,211,247,0.12)' : 'transparent',
      color: active ? T.primary : T.textHi,
      fontSize:13, fontWeight:600, cursor:'pointer', marginBottom:2,
      transition:'all .12s', position:'relative'
    }}
    onMouseEnter={e=>{ if(!active) e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; }}
    onMouseLeave={e=>{ if(!active) e.currentTarget.style.background = 'transparent'; }}>
      <span className="ms" style={{ fontSize:20, opacity: active ? 1 : 0.78 }}>{it.i}</span>
      <span style={{ flex:1 }}>{it.l}</span>
      {it.badge && (
        it.badge.type === 'alert' ? (
          <span style={{ width:8, height:8, borderRadius:'50%', background:it.badge.c,
            animation:'pulse 1.5s ease-in-out infinite', boxShadow:`0 0 8px ${it.badge.c}aa` }}></span>
        ) : it.badge.type === 'next' ? (
          <span style={{ fontSize:9, color:it.badge.c, fontFamily:'JetBrains Mono', fontWeight:700, opacity:0.85 }}>{it.badge.v}</span>
        ) : (
          <span style={{ fontSize:10, padding:'1px 7px', borderRadius:8,
            background:`${it.badge.c}22`, color:it.badge.c, fontWeight:700 }}>{it.badge.v}</span>
        )
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// E · "Hybrid Refined" — A's softness + B's countdown widget
//                      + C's user-down + 4 footer buttons
// ═══════════════════════════════════════════════════════════
function VariantE() {
  return (
    <div style={{ width:'100%', height:'100%', background:T.surfaceLow,
      borderRight:`1px solid ${T.border}`, display:'flex', flexDirection:'column',
      fontFamily:'Inter', color:T.textHi }}>

      {/* Logo */}
      <div style={{ padding:'18px 18px 14px', display:'flex', alignItems:'center', gap:12 }}>
        <Logo size={34}/>
        <div>
          <div style={{ fontWeight:800, letterSpacing:'0.06em', fontSize:14 }}>BLASTR</div>
          <div style={{ fontSize:9, color:T.textLow, letterSpacing:'0.16em', fontWeight:600 }}>RAID HUB</div>
        </div>
      </div>

      {/* Static + countdown widget */}
      <div style={{ padding:'0 14px 14px' }}>
        <CountdownWidget rounded={true}/>
      </div>

      {/* Nav */}
      <nav style={{ flex:1, overflowY:'auto', padding:'4px 12px' }} className="noscroll">
        {NAV.map((it,i)=> <NavRow key={i} it={it} active={i===0} rounded={true}/>)}

        {/* Personal section */}
        <div style={{ height:1, background:T.border, margin:'14px 8px 10px' }}></div>
        <div style={{ fontSize:9, color:T.textLow, letterSpacing:'0.14em', fontWeight:700, padding:'0 14px 6px' }}>МІЙ АКАУНТ</div>
        {[
          { i:'shield_person', l:'Мої персонажі', badge:{type:'count', v:4, c:T.textMid} },
          { i:'settings',      l:'Налаштування' },
        ].map((it,i)=> <NavRow key={i} it={it} active={false} rounded={true}/>)}
      </nav>

      {/* User card */}
      <div style={{ padding:'10px 14px 8px' }}>
        <UserCard rounded={true}/>
      </div>

      {/* Footer buttons grid */}
      <div style={{ padding:'4px 14px 14px' }}>
        <FooterButtons rounded={true} layout="grid" items={[
          { i:'forum',     c:'#5865F2',     s:'Discord', l:'Discord сервер' },
          { i:'volunteer_activism', c:'#F96854', s:'Patreon', l:'Підтримати на Patreon' },
          { i:'feedback',  c:T.primary,     s:'Фідбек',  l:'Залишити фідбек' },
          { i:'help',      c:T.textMid,     s:'Довідка', l:'Довідка' },
        ]}/>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// F · "Glass card" — soft cards для всього, gradient bg
// ═══════════════════════════════════════════════════════════
function VariantF() {
  return (
    <div style={{ width:'100%', height:'100%',
      background:`linear-gradient(180deg, #16161a 0%, #0d0d10 100%)`,
      borderRight:`1px solid ${T.border}`,
      display:'flex', flexDirection:'column', fontFamily:'Inter', color:T.textHi, position:'relative'
    }}>
      {/* aura */}
      <div style={{ position:'absolute', top:-100, left:-50, width:300, height:300,
        background:'radial-gradient(circle, rgba(79,211,247,0.08) 0%, transparent 70%)',
        pointerEvents:'none' }}></div>

      <div style={{ padding:'18px 16px 12px', display:'flex', alignItems:'center', gap:12, position:'relative' }}>
        <Logo size={34}/>
        <div>
          <div style={{ fontWeight:800, letterSpacing:'0.06em', fontSize:14 }}>BLASTR</div>
          <div style={{ fontSize:9, color:T.primary, letterSpacing:'0.16em', fontWeight:700 }}>RAID HUB</div>
        </div>
      </div>

      <div style={{ padding:'0 14px 12px', position:'relative' }}>
        <CountdownWidget rounded={true}/>
      </div>

      {/* Nav inside a soft card */}
      <div style={{ flex:1, padding:'0 12px', overflowY:'auto', position:'relative' }} className="noscroll">
        <div style={{
          background:'rgba(255,255,255,0.025)',
          borderRadius:14, padding:'8px',
          border:`1px solid ${T.border}`,
          backdropFilter:'blur(10px)'
        }}>
          {NAV.map((it,i)=> <NavRow key={i} it={it} active={i===0} rounded={true}/>)}
        </div>

        <div style={{ marginTop:10, background:'rgba(255,255,255,0.025)',
          borderRadius:14, padding:'8px', border:`1px solid ${T.border}` }}>
          {[
            { i:'shield_person', l:'Мої персонажі', badge:{type:'count', v:4, c:T.textMid} },
            { i:'settings',      l:'Налаштування' },
          ].map((it,i)=> <NavRow key={i} it={it} active={false} rounded={true}/>)}
        </div>
      </div>

      <div style={{ padding:'12px 14px 8px', position:'relative' }}>
        <UserCard rounded={true}/>
      </div>
      <div style={{ padding:'4px 14px 14px', position:'relative' }}>
        <FooterButtons rounded={true} layout="inline" items={[
          { i:'forum',              c:'#5865F2',  l:'Discord' },
          { i:'volunteer_activism', c:'#F96854',  l:'Patreon' },
          { i:'campaign',           c:T.primary,  l:'Анонс у Discord' },
          { i:'feedback',           c:T.tertiary, l:'Фідбек' },
          { i:'help',               c:T.textMid,  l:'Довідка' },
        ]}/>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// G · "Spacious & calm" — багато повітря, великі радіуси,
//                         кнопки 2×3 знизу з підписами
// ═══════════════════════════════════════════════════════════
function VariantG() {
  return (
    <div style={{ width:'100%', height:'100%', background:'#101012',
      borderRight:`1px solid ${T.border}`,
      display:'flex', flexDirection:'column', fontFamily:'Inter', color:T.textHi }}>

      {/* Logo */}
      <div style={{ padding:'22px 20px 14px', display:'flex', alignItems:'center', gap:12 }}>
        <Logo size={36}/>
        <div>
          <div style={{ fontWeight:800, letterSpacing:'0.04em', fontSize:15 }}>BLASTR</div>
          <div style={{ fontSize:9.5, color:T.textLow, letterSpacing:'0.16em', fontWeight:600 }}>RAID HUB</div>
        </div>
      </div>

      <div style={{ padding:'0 16px 16px' }}>
        <CountdownWidget rounded={true}/>
      </div>

      <nav style={{ flex:1, overflowY:'auto', padding:'4px 14px' }} className="noscroll">
        {NAV.map((it,i)=> {
          const active = i === 0;
          return (
            <div key={i} style={{
              display:'flex', alignItems:'center', gap:14,
              padding:'12px 16px', borderRadius:14,
              background: active ? 'rgba(79,211,247,0.10)' : 'transparent',
              color: active ? T.primary : T.textHi,
              fontSize:13.5, fontWeight:600, cursor:'pointer', marginBottom:3,
              border: active ? `1px solid rgba(79,211,247,0.25)` : '1px solid transparent',
              transition:'all .12s'
            }}
            onMouseEnter={e=>{ if(!active) e.currentTarget.style.background = 'rgba(255,255,255,0.03)'; }}
            onMouseLeave={e=>{ if(!active) e.currentTarget.style.background = 'transparent'; }}>
              <span className="ms" style={{ fontSize:22, opacity: active ? 1 : 0.78 }}>{it.i}</span>
              <span style={{ flex:1 }}>{it.l}</span>
              {it.badge && (
                it.badge.type === 'alert' ? (
                  <span style={{ width:8, height:8, borderRadius:'50%', background:it.badge.c,
                    animation:'pulse 1.5s ease-in-out infinite' }}></span>
                ) : it.badge.type === 'next' ? (
                  <span style={{ fontSize:10, color:it.badge.c, fontFamily:'JetBrains Mono', fontWeight:700 }}>{it.badge.v}</span>
                ) : (
                  <span style={{ fontSize:10.5, padding:'2px 8px', borderRadius:10,
                    background:`${it.badge.c}22`, color:it.badge.c, fontWeight:700 }}>{it.badge.v}</span>
                )
              )}
            </div>
          );
        })}
      </nav>

      {/* Personal section */}
      <div style={{ padding:'10px 14px 0' }}>
        <div style={{ fontSize:9, color:T.textLow, letterSpacing:'0.14em', fontWeight:700, padding:'0 16px 6px' }}>АКАУНТ</div>
        {[
          { i:'shield_person', l:'Мої персонажі' },
          { i:'settings',      l:'Налаштування' },
        ].map((it,i)=>(
          <div key={i} style={{ display:'flex', alignItems:'center', gap:14, padding:'10px 16px',
            color:T.textMid, fontSize:12.5, fontWeight:600, cursor:'pointer', borderRadius:14,
            transition:'background .12s' }}
            onMouseEnter={e=>e.currentTarget.style.background = 'rgba(255,255,255,0.03)'}
            onMouseLeave={e=>e.currentTarget.style.background = 'transparent'}>
            <span className="ms" style={{ fontSize:20 }}>{it.i}</span>
            <span>{it.l}</span>
          </div>
        ))}
      </div>

      <div style={{ padding:'14px 16px 10px' }}>
        <UserCard rounded={true}/>
      </div>

      {/* Big 2x3 button grid */}
      <div style={{ padding:'4px 16px 16px' }}>
        <FooterButtons rounded={true} layout="grid" items={[
          { i:'forum',              c:'#5865F2',  s:'Discord', l:'Discord сервер' },
          { i:'volunteer_activism', c:'#F96854',  s:'Patreon', l:'Patreon' },
          { i:'feedback',           c:T.primary,  s:'Фідбек',  l:'Фідбек' },
          { i:'help',               c:T.textMid,  s:'Довідка', l:'Довідка' },
        ]}/>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// H · "Card-stacked" — sidebar це стопка карток на тлі
// ═══════════════════════════════════════════════════════════
function VariantH() {
  return (
    <div style={{ width:'100%', height:'100%', background:'#0a0a0c', padding:10,
      display:'flex', flexDirection:'column', gap:8, fontFamily:'Inter', color:T.textHi }}>

      {/* Header card */}
      <div style={{ background:T.surfaceLow, borderRadius:14, padding:'14px 14px 12px',
        border:`1px solid ${T.border}` }}>
        <div style={{ display:'flex', alignItems:'center', gap:11 }}>
          <Logo size={32}/>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:800, letterSpacing:'0.06em', fontSize:14 }}>BLASTR</div>
            <div style={{ fontSize:9, color:T.textLow, letterSpacing:'0.16em', fontWeight:600 }}>RAID HUB</div>
          </div>
          <Tooltip text="Сповіщення">
            <button style={{ width:28, height:28, borderRadius:8, background:'rgba(255,255,255,0.04)',
              border:`1px solid ${T.border}`, color:T.textMid, cursor:'pointer',
              display:'grid', placeItems:'center', position:'relative' }}>
              <span className="ms" style={{ fontSize:16 }}>notifications</span>
              <span style={{ position:'absolute', top:4, right:4, width:6, height:6, borderRadius:'50%', background:T.error }}></span>
            </button>
          </Tooltip>
        </div>
      </div>

      {/* Static card */}
      <div style={{ background:T.surfaceLow, borderRadius:14, padding:'12px',
        border:`1px solid ${T.border}` }}>

      {/* Nav card */}
      <div style={{ background:T.surfaceLow, borderRadius:14, padding:'8px',
        border:`1px solid ${T.border}`, flex:1, overflowY:'auto' }} className="noscroll">

      {/* Account card */}
      <div style={{ background:T.surfaceLow, borderRadius:14, padding:'8px',
        border:`1px solid ${T.border}` }}>
        {[
          { i:'shield_person', l:'Мої персонажі', badge:{type:'count', v:4, c:T.textMid} },
          { i:'settings',      l:'Налаштування' },
        ].map((it,i)=> <NavRow key={i} it={it} active={false} rounded={true}/>)}
      </div>

      {/* User card */}
      <div style={{ background:T.surfaceLow, borderRadius:14,
        border:`1px solid ${T.border}`, padding:8 }}>
        <UserCard rounded={true} compact={true}/>
        <div style={{ height:1, background:T.border, margin:'8px 4px' }}></div>
        <FooterButtons rounded={true} layout="inline" items={[
          { i:'forum',              c:'#5865F2',  l:'Discord' },
          { i:'volunteer_activism', c:'#F96854',  l:'Patreon' },
          { i:'feedback',           c:T.primary,  l:'Фідбек' },
          { i:'help',               c:T.textMid,  l:'Довідка' },
        ]}/>
      </div>
    </div>
  );
}

          {/* Roster mini bars */}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:6, marginTop:10,
            paddingTop:10, borderTop:`1px solid ${T.border}` }}>
            {[
              {l:'T',v:2,m:2,c:'#3b82f6'},
              {l:'H',v:4,m:4,c:T.success},
              {l:'M',v:6,m:8,c:T.error},

      <nav style={{ flex:1, overflowY:'auto', padding:'4px 12px' }} className="noscroll">
