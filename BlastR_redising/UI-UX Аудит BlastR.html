<style>
  html, body { margin:0; padding:0; height:100%; background:#f0eee9; font-family: 'Inter', system-ui, sans-serif; color:#2a251f; }
  * { box-sizing: border-box; }

  /* Annotation pin */
  .ann-pin { position:absolute; width:22px; height:22px; border-radius:50%;
    background:#c96442; color:#fff; font-weight:800; font-size:11px;
    display:grid; place-items:center; box-shadow:0 4px 12px rgba(0,0,0,.25), 0 0 0 3px rgba(255,255,255,.85);
    cursor:help; z-index:5; font-family:'Inter', sans-serif;
    transition: transform .12s ease;
  }
  .ann-pin:hover { transform: scale(1.15); }
  .ann-pin[data-sev="critical"] { background:#dc2626; }
  .ann-pin[data-sev="high"]     { background:#ea580c; }
  .ann-pin[data-sev="medium"]   { background:#ca8a04; }
  .ann-pin[data-sev="low"]      { background:#0891b2; }

  /* Annotation tooltip */
  .ann-tip {
    position:absolute; left:30px; top:-4px; min-width:240px; max-width:320px;
    background:#1a1611; color:#f5f0e6; padding:10px 12px; border-radius:6px;
    font-size:12px; line-height:1.45; opacity:0; pointer-events:none;
    transition: opacity .15s ease; z-index:6;
    box-shadow: 0 12px 36px rgba(0,0,0,.35);
  }
  .ann-tip strong { color:#fcd34d; display:block; margin-bottom:3px; font-size:11px; letter-spacing:.04em; text-transform:uppercase; }
  .ann-pin:hover + .ann-tip,
  .ann-tip:hover { opacity:1; pointer-events:auto; }

  /* Severity legend chip */
  .sev-chip { display:inline-flex; align-items:center; gap:6px; padding:3px 8px; border-radius:10px; font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; }
  .sev-chip .dot { width:7px; height:7px; border-radius:50%; }

  .summary-box {
    background:#fffbf5; border:1px solid rgba(60,50,40,.12); border-radius:8px;
    padding:18px 22px; box-shadow: 0 2px 10px rgba(60,50,40,.04);
  }

  .label-tag { display:inline-block; padding:2px 8px; background:rgba(60,50,40,.08); border-radius:4px; font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#5a4a2a; }
</style>

// ───────────────────────────────────────────────────────────
// Reusable: annotated screenshot wrapper
// ───────────────────────────────────────────────────────────
function Annotated({ src, anns = [], width, height }) {
  return (
    <div style={{ position:'relative', width, height, background:'#0e0e10', overflow:'hidden' }}>
      <img src={src} draggable="false" style={{ display:'block', width:'100%', height:'100%', objectFit:'cover', objectPosition:'top left' }} />
      {anns.map((a, i) => (
        <React.Fragment key={i}>
          <div className="ann-pin" data-sev={a.sev} style={{ left:`${a.x}%`, top:`${a.y}%` }}>{a.n}</div>
          <div className="ann-tip" style={{ left:`calc(${a.x}% + 30px)`, top:`calc(${a.y}% - 4px)` }}>
            <strong>{a.n}. {a.title} <span style={{color:'#9aa0a6', marginLeft:6}}>· {a.sev}</span></strong>
            {a.body}
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

// ───────────────────────────────────────────────────────────
// Severity chip
// ───────────────────────────────────────────────────────────
function Sev({ kind }) {
  const map = {
    critical: { c:'#dc2626', l:'Critical' },
    high:     { c:'#ea580c', l:'High' },
    medium:   { c:'#ca8a04', l:'Medium' },
    low:      { c:'#0891b2', l:'Low' },
  };
  const m = map[kind];
  return (
    <span className="sev-chip" style={{ background:`${m.c}1a`, color:m.c }}>
      <span className="dot" style={{ background:m.c }}></span>{m.l}
    </span>
  );
}

      <DCSection id="settings" title="07 · Налаштування" subtitle="Профіль, інтеграції, статик. Низька частота, але ховає 2 destructive дії.">
        <DCArtboard id="set-original" label="Оригінал · з анотаціями" width={1000} height={620}>
          <Annotated src="screenshots/07-settings.png" anns={settingsAnns} width="100%" height="100%" />
        </DCArtboard>
        <DCArtboard id="set-recommend" label="Рекомендації" width={620} height={620}>
          <div style={{ width:'100%', height:'100%', background:'#fffbf5', padding:32, fontSize:13, color:'#2a251f', lineHeight:1.6, overflow:'auto' }}>
            <h3 style={{ margin:'0 0 12px', fontSize:16, fontWeight:800 }}>Що зробити</h3>
            <ol style={{ paddingLeft:20, margin:0 }}>
              <li style={{ marginBottom:14 }}><strong>Native iOS-style toggles.</strong> Замість checkbox — switch. Це settings-стандарт.</li>
              <li style={{ marginBottom:14 }}><strong>«Небезпечна зона» секція.</strong> «Покинути статик», «Відключити Discord», «Видалити акаунт» — групувати у червону секцію внизу. Кожне — 2-step modal з вводом імені.</li>
              <li style={{ marginBottom:14 }}><strong>H1 = поточний таб.</strong> Активний таб «Профіль» → H1 «Профіль», breadcrumbs над ним «Налаштування / Характерники / Профіль».</li>
              <li style={{ marginBottom:14 }}><strong>Tab-індикатор сильніший.</strong> Текст активного — primary колір + 3px підкреслення.</li>
              <li style={{ marginBottom:14 }}><strong>Інтеграції — статус timestamps.</strong> «Останній sync», «Розриває звʼязок при …» — додати context.</li>
            </ol>
          </div>
        </DCArtboard>
      </DCSection>

      {/* LANDING */}
      <DCSection id="landing" title="08 · Landing blastr.pro" subtitle="Маркетинг-сторінка. Аудит на основі публічного скрейпу — без скріншотів самого продукту вище fold.">
        <DCArtboard id="landing-notes" label="Зауваження + рекомендації" width={780} height={520}>
          <div style={{ width:'100%', height:'100%', background:'#fffbf5', padding:32, fontSize:13, color:'#2a251f', lineHeight:1.6, overflow:'auto' }}>
            <h3 style={{ margin:'0 0 6px', fontSize:18, fontWeight:800 }}>Лендінг — спостереження</h3>
            <p style={{ margin:'0 0 18px', color:'#5a4a2a', fontSize:12 }}>Не маючи живої взаємодії з лендінгом, аудит обмежений структурою та копірайтом.</p>

            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {landingObservations.map((it,i)=>(
                <div key={i} style={{ padding:'12px 14px', background:'#f5f0e6', borderRadius:6, borderLeft:`3px solid ${({critical:'#dc2626',high:'#ea580c',medium:'#ca8a04',low:'#0891b2'})[it.sev]}` }}>
                  <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4 }}>
                    <Sev kind={it.sev} />
                    <strong style={{ fontSize:13 }}>{it.title}</strong>
                  </div>
                  <div style={{ fontSize:12, color:'#5a4a2a' }}>{it.body}</div>
                </div>
              ))}
            </div>

            <h3 style={{ margin:'24px 0 8px', fontSize:15, fontWeight:800 }}>Структура hero, яку я б рекомендував</h3>
            <ol style={{ paddingLeft:20, margin:0, fontSize:12, color:'#5a4a2a' }}>
              <li style={{ marginBottom:6 }}><strong>H1 (one-liner):</strong> «Командний центр для рейд-статіку WoW»</li>
              <li style={{ marginBottom:6 }}><strong>Subtitle:</strong> 1-2 речення про користь, не процес</li>
              <li style={{ marginBottom:6 }}><strong>Primary CTA + secondary CTA:</strong> «Зайти через Battle.net» + «Подивитись демо»</li>
              <li style={{ marginBottom:6 }}><strong>Скріншот дашборда</strong> з реальними даними, не plug-art</li>
              <li style={{ marginBottom:6 }}><strong>Логотипи 3-5 ранніх гільдій</strong> або кількість користувачів</li>
              <li style={{ marginBottom:6 }}><strong>3 секції features</strong>: Roster Matrix, Treasury, AI Analytics — з міні-демо</li>
            </ol>
          </div>
        </DCArtboard>

        <DCArtboard id="landing-positioning" label="Позиціонування" width={620} height={520}>
          <div style={{ width:'100%', height:'100%', background:'#fffbf5', padding:32, fontSize:13, color:'#2a251f', lineHeight:1.6, overflow:'auto' }}>
            <h3 style={{ margin:'0 0 12px', fontSize:16, fontWeight:800 }}>Тон і позиціонування</h3>
            <p>Конкуренти діляться на 2 камп:</p>
            <div style={{ marginTop:14 }}>
              <div style={{ padding:14, background:'#f5f0e6', borderRadius:6, marginBottom:10 }}>
                <strong>Утилітарні (Wowaudit, Raid-Helper):</strong>
                <div style={{ fontSize:12, color:'#5a4a2a', marginTop:4 }}>Сухі, дата-фокусовані. Виграють на продуктивних користувачах, програють на привабливості.</div>
              </div>
              <div style={{ padding:14, background:'#f5f0e6', borderRadius:6, marginBottom:10 }}>
                <strong>Преміум (Method Raid Tools, Echo eXtension):</strong>
                <div style={{ fontSize:12, color:'#5a4a2a', marginTop:4 }}>Кінематографічний UI, мова про «esports», «top guilds». Виграють у комʼюніті.</div>
              </div>
            </div>
            <p style={{ marginTop:14 }}>BlastR зараз зависає посередині: тактична військова мова («Командний пункт») потенційно преміум, але виконання — утилітарне. <strong>Виберіть один полюс.</strong></p>
            <div style={{ marginTop:18, padding:14, background:'#fff8dc', borderRadius:6, borderLeft:'3px solid #fcd34d' }}>
              <strong>Моя рекомендація:</strong> доєднатися до преміум-камп. У вас вже є основа (cyan/orange/yellow палітра з cyberpunk-натяком, монопростірний шрифт) — потрібно додати дисципліни в копірайті та більше «дрібних» деталей в UI: микро-анімації, sound design, hover-states, glass-effects на модалах.
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      {/* PRIORITY ROADMAP */}
      <DCSection id="roadmap" title="Roadmap · послідовність виправлень" subtitle="Те, що дасть найбільше impact за мінімум effort. Систематизовано за severity + effort.">
        <DCArtboard id="roadmap-table" label="Effort vs Impact" width={1100} height={580}>
          <div style={{ width:'100%', height:'100%', background:'#fffbf5', padding:32, fontSize:12, color:'#2a251f', overflow:'auto' }}>
            <h3 style={{ margin:'0 0 4px', fontSize:18, fontWeight:800 }}>Послідовність виправлень — 4 хвилі</h3>
            <p style={{ margin:'0 0 18px', color:'#5a4a2a', fontSize:12 }}>Швидкі перемоги першими. Кожна хвиля = 1-2 спринти.</p>

            <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:14 }}>
              {[
                {
                  wave:'ХВИЛЯ 1', title:'Quick Wins', sub:'Малий effort · великий impact · 1 спринт',
                  color:'#16a34a',
                  items:[
                    'Числа з пробілами (140 000g)',
                    'iOS-style toggles в settings',
                    'Native ✓ vs ✗ диференціація',
                    'Critical alert на скарбниці',
                    'Tab-індикатор сильніший',
                    'Прибрати «ПРОАНАЛІЗОВАНО» бейджі',
                    'Confirmation для destructive дій',
                  ]
                },
                {
                  wave:'ХВИЛЯ 2', title:'Hierarchy Reset', sub:'Середній effort · фундамент · 2 спринти',
                  color:'#0891b2',
                  items:[
                    'Один H1 на сторінку (= активний контекст)',
                    'Breadcrumbs замість eyebrow',
                    'Hero-картка countdown на дашборді',
                    'Кольорова семантика (M/H/N) глобально',
                    'Іконки → іконка + label',
                    'Filter strips зверху таблиць',
                  ]
                },
                {
                  wave:'ХВИЛЯ 3', title:'Component System', sub:'Великий effort · накопичувальний impact · 3-4 спринти',
                  color:'#ca8a04',
                  items:[
                    'Sticky-roles в Roster матриці',
                    'View switcher (Місяць/Тиждень/Список)',
                    'Bulk-actions на внесках',
                    'Sparkline-charts на Аналітиці',
                    '«Небезпечна зона» в settings',
                    'Empty states для всіх таблиць',
                  ]
                },
                {
                  wave:'ХВИЛЯ 4', title:'Polish & Brand', sub:'Маленький effort · бренд-impact · постійно',
                  color:'#a855f7',
                  items:[
                    'Microcopy ревʼю всього UA-перекладу',
                    'Hover-states глибші (glass effect)',
                    'Sound design на критичних діях',
                    'Лендінг redesign з продуктовими скрінами',
                    'Onboarding-флоу з прогрес-баром',
                    'Тон: «преміум» або «утилітарний» — final pick',
                  ]
                },
              ].map((w,i)=>(
                <div key={i} style={{ padding:18, background:'#f5f0e6', borderRadius:8, borderTop:`4px solid ${w.color}` }}>
                  <div style={{ fontSize:10, color:w.color, fontWeight:700, letterSpacing:'0.10em', marginBottom:4 }}>{w.wave}</div>
                  <div style={{ fontSize:15, fontWeight:800, marginBottom:4 }}>{w.title}</div>
                  <div style={{ fontSize:10, color:'#5a4a2a', marginBottom:12 }}>{w.sub}</div>
                  <ul style={{ margin:0, paddingLeft:16, fontSize:11, color:'#2a251f' }}>
                    {w.items.map((it,j)=>(<li key={j} style={{ marginBottom:5, lineHeight:1.4 }}>{it}</li>))}
                  </ul>
                </div>
              ))}
            </div>

            <div style={{ marginTop:24, padding:16, background:'#fff8dc', borderRadius:6, borderLeft:'3px solid #fcd34d', fontSize:12, color:'#5a4a2a' }}>
              <strong>Принцип на кожному кроці:</strong> «Що користувач шукає на цій сторінці?» → виділити це візуально найбільше → решту приглушити. Ваш продукт перевантажений саме тому, що всі елементи мають однакову вагу.
            </div>
          </div>
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
