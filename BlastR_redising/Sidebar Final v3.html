<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<title>BlastR · Sidebar Final v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; height:100%; background:#0e0e10; font-family:'Inter', system-ui, sans-serif; color:#f9f5f8; }
  * { box-sizing: border-box; }
  .ms { font-family:'Material Symbols Rounded'; font-weight:500; line-height:1; vertical-align:middle; -webkit-font-feature-settings:'liga'; font-feature-settings:'liga'; }
  .noscroll::-webkit-scrollbar { display:none; }
  .noscroll { scrollbar-width:none; }
  @keyframes pulse { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.3); opacity:0.55; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" data-presets="react">

const T = {
  bg:'#0e0e10', surface:'#19191c', surfaceHigh:'#222226', surfaceLow:'#131315',
  primary:'#4fd3f7', secondary:'#fa7902', tertiary:'#fcf266',
  error:'#ff6e84', success:'#39FF14',
  textHi:'#f9f5f8', textMid:'#adaaad', textLow:'#767577',
  border:'rgba(255,255,255,0.06)', borderStrong:'rgba(255,255,255,0.12)',
};

// ───── Wordmark "BlastR" — заголовна літера R primary ─────
function Wordmark({ size=15 }) {
  return (
    <div style={{
      fontWeight:800, letterSpacing:'0.04em', fontSize:size,
      color:T.textHi, fontFamily:'Inter', display:'inline-flex', alignItems:'baseline'
    }}>
      <span>BLAST</span>
      <span style={{
        color:T.primary,
        textShadow:`0 0 14px rgba(79,211,247,0.55)`,
        fontWeight:900, letterSpacing:'0.02em'
      }}>R</span>
    </div>
  );
}

function Logo({ size=34 }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:8,
      background:`linear-gradient(135deg, ${T.primary} 0%, #14b2d5 100%)`,
      display:'grid', placeItems:'center', color:'#003040',
      fontWeight:800, fontSize:size*0.55,
      boxShadow:'0 0 0 1px rgba(79,211,247,0.3), 0 6px 18px rgba(79,211,247,0.18)',
      letterSpacing:'-0.02em', flexShrink:0
    }}>B</div>
  );
}

function Tooltip({ children, text, side='top' }) {
  const [show, setShow] = React.useState(false);
  if (!text) return children;
  const pos = side === 'right'
    ? { left:'calc(100% + 10px)', top:'50%', transform:'translateY(-50%)' }
    : { bottom:'calc(100% + 8px)', left:'50%', transform:'translateX(-50%)' };
  return (
    <span style={{ position:'relative', display:'inline-flex' }} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
      {children}
      {show && (
        <span style={{
          position:'absolute', ...pos,
          background:'#000', color:T.textHi, padding:'4px 8px', borderRadius:6, fontSize:11,
          whiteSpace:'nowrap', zIndex:99, border:`1px solid ${T.borderStrong}`, fontWeight:500
        }}>{text}</span>
      )}
    </span>
  );
}

function Avatar({ size=34, color='#FF7C0A', initial='Z' }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%',
      background:`linear-gradient(135deg, ${color}66, ${color}22)`,
      border:`1.5px solid ${color}aa`,
      display:'grid', placeItems:'center', color, fontSize:size*0.42, fontWeight:700, flexShrink:0
    }}>{initial}</div>
  );
}

const NAV = [
  { i:'space_dashboard', l:'Огляд' },
  { i:'groups',          l:'Склад',          badge:{type:'count', v:3, c:T.primary} },
  { i:'event',           l:'Розклад',        badge:{type:'next', v:'2д 7г', c:T.tertiary} },
  { i:'sports_esports',  l:'Boss Planner' },
  { i:'savings',         l:'Скарбниця',      badge:{type:'alert', c:T.error} },
  { i:'analytics',       l:'Аналітика' },
  { i:'shield',          l:'Екіпіровка',     badge:{type:'count', v:2, c:T.secondary} },
];
const ACCOUNT = [
  { i:'shield_person', l:'Мої персонажі', badge:{type:'count', v:4, c:T.textMid} },
  { i:'settings',      l:'Налаштування' },
];

function NavRow({ it, active, onClick }) {
  return (
    <div onClick={onClick} style={{
      display:'flex', alignItems:'center', gap:14,
      padding:'11px 14px', borderRadius:12,
      background: active ? 'rgba(79,211,247,0.10)' : 'transparent',
      color: active ? T.primary : T.textHi,
      fontSize:13, fontWeight:600, cursor:'pointer', marginBottom:2,
      border: active ? `1px solid rgba(79,211,247,0.28)` : '1px solid transparent',
      transition:'all .12s'
    }}
    onMouseEnter={e=>{ if(!active) e.currentTarget.style.background = 'rgba(255,255,255,0.035)'; }}
    onMouseLeave={e=>{ if(!active) e.currentTarget.style.background = 'transparent'; }}>
      <span className="ms" style={{ fontSize:21, opacity: active ? 1 : 0.78 }}>{it.i}</span>
      <span style={{ flex:1 }}>{it.l}</span>
      {it.badge && (
        it.badge.type === 'alert' ? (
          <span style={{ width:8, height:8, borderRadius:'50%', background:it.badge.c,
            animation:'pulse 1.5s ease-in-out infinite', boxShadow:`0 0 8px ${it.badge.c}aa` }}></span>
        ) : it.badge.type === 'next' ? (
          <span style={{ fontSize:9.5, color:it.badge.c, fontFamily:'JetBrains Mono', fontWeight:700 }}>{it.badge.v}</span>
        ) : (
          <span style={{ fontSize:10.5, padding:'2px 8px', borderRadius:10,
            background:`${it.badge.c}22`, color:it.badge.c, fontWeight:700 }}>{it.badge.v}</span>
        )
      )}
    </div>
  );
}

// ───── Static + countdown widget (shared) ─────
function StaticWidget({ inviteVariant }) {
  return (
    <div style={{
      borderRadius:12, padding:'12px 14px',
      background:`linear-gradient(135deg, rgba(79,211,247,0.10), rgba(79,211,247,0.02) 70%)`,
      border:`1px solid rgba(79,211,247,0.20)`,
      position:'relative'
    }}>
      {/* Header row: СТАТІК label + inline invite button */}
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
        <span style={{ width:6, height:6, borderRadius:'50%', background:T.success,
          boxShadow:`0 0 0 3px rgba(57,255,20,0.18)`, flexShrink:0 }}></span>
        <span style={{ flex:1, fontSize:9, color:T.textLow, letterSpacing:'0.14em', fontWeight:700 }}>СТАТІК</span>
        <Tooltip text="Згенерувати інвайт-посилання (тільки офіцери)" side="top">
          <button style={{
            display:'flex', alignItems:'center', gap:5,
            padding:'4px 9px 4px 7px', borderRadius:12,
            background:`linear-gradient(135deg, rgba(79,211,247,0.20), rgba(79,211,247,0.08))`,
            border:`1px solid rgba(79,211,247,0.40)`, color:T.primary,
            fontWeight:700, fontSize:9.5, letterSpacing:'0.06em', cursor:'pointer',
            textTransform:'uppercase', transition:'all .15s', whiteSpace:'nowrap'
          }}
          onMouseEnter={e=>{ e.currentTarget.style.boxShadow = '0 0 0 3px rgba(79,211,247,0.12)'; e.currentTarget.style.background = 'linear-gradient(135deg, rgba(79,211,247,0.32), rgba(79,211,247,0.16))'; }}
          onMouseLeave={e=>{ e.currentTarget.style.boxShadow = 'none'; e.currentTarget.style.background = 'linear-gradient(135deg, rgba(79,211,247,0.20), rgba(79,211,247,0.08))'; }}>
            <span className="ms" style={{ fontSize:13 }}>person_add</span>
            <span>Запросити</span>
          </button>
        </Tooltip>
      </div>
      <div style={{ fontSize:14, fontWeight:800, color:T.textHi, lineHeight:1.15 }}>Характерники</div>
      <div style={{ fontSize:10, color:T.primary, marginTop:2, fontWeight:600 }}>Mythic Progression · 2/9</div>

      <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between',
        marginTop:10, paddingTop:10, borderTop:`1px solid ${T.border}` }}>
        <div>
          <div style={{ fontSize:8, color:T.textLow, letterSpacing:'0.14em', fontWeight:700 }}>NEXT RAID</div>
          <div style={{ fontFamily:'JetBrains Mono', fontWeight:800, fontSize:14, color:T.tertiary, lineHeight:1 }}>02:07:11</div>
        </div>
        <button style={{ padding:'6px 12px', borderRadius:20,
          background:T.tertiary, border:'none', color:'#1a1a00',
          fontSize:9.5, fontWeight:800, letterSpacing:'0.06em', cursor:'pointer' }}>RSVP</button>
      </div>
    </div>
  );
}

// ───── Invite button styles ─────
function InvitePrimaryButton() {
  return (
    <button style={{
      width:'100%', padding:'10px 12px', borderRadius:10,
      background:`linear-gradient(135deg, rgba(79,211,247,0.18), rgba(79,211,247,0.08))`,
      border:`1px solid rgba(79,211,247,0.35)`, color:T.primary,
      fontWeight:700, fontSize:12, letterSpacing:'0.04em', cursor:'pointer',
      display:'flex', alignItems:'center', justifyContent:'center', gap:8,
      boxShadow:'0 0 0 0 rgba(79,211,247,0)', transition:'all .15s'
    }}
    onMouseEnter={e=>{ e.currentTarget.style.boxShadow = '0 0 0 3px rgba(79,211,247,0.10)'; e.currentTarget.style.background = 'linear-gradient(135deg, rgba(79,211,247,0.25), rgba(79,211,247,0.12))'; }}
    onMouseLeave={e=>{ e.currentTarget.style.boxShadow = '0 0 0 0 rgba(79,211,247,0)'; e.currentTarget.style.background = 'linear-gradient(135deg, rgba(79,211,247,0.18), rgba(79,211,247,0.08))'; }}>
      <span className="ms" style={{ fontSize:18 }}>person_add</span>
      <span>Запросити в статік</span>
    </button>
  );
}

// ───── Sidebar shell with variant prop ─────
function Sidebar({ variant, active, setActive, lang, setLang }) {
  return (
    <div style={{
      width:'100%', height:'100%',
      background:`linear-gradient(180deg, #16161a 0%, #0d0d10 100%)`,
      borderRight:`1px solid ${T.border}`,
      display:'flex', flexDirection:'column', position:'relative', overflow:'hidden'
    }}>
      {/* aura */}
      <div style={{ position:'absolute', top:-100, left:-50, width:300, height:300,
        background:'radial-gradient(circle, rgba(79,211,247,0.08) 0%, transparent 70%)',
        pointerEvents:'none' }}></div>

      {/* Logo block — header layout depends on variant */}
      <div style={{ padding:'18px 18px 14px', display:'flex', alignItems:'center', gap:12, position:'relative' }}>
        <Logo size={34}/>
        <div style={{ flex:1, minWidth:0 }}>
          <Wordmark size={15}/>
          <div style={{ fontSize:9, color:T.textLow, letterSpacing:'0.16em', fontWeight:700, marginTop:1 }}>RAID HUB</div>
        </div>

        {/* Lang pill in header (final) */}
        <LangPill lang={lang} setLang={setLang}/>
      </div>

      {/* Static widget (icon-invite for variant B) */}
      <div style={{ padding:'0 14px 14px', position:'relative' }}>
        <StaticWidget inviteVariant="icon"/>
      </div>

      {false && (
        <div style={{ padding:'0 14px 14px', position:'relative' }}>
          <InvitePrimaryButton/>
        </div>
      )}

      {/* Nav glass card */}
      <div style={{ flex:1, padding:'0 12px', overflowY:'auto', position:'relative' }} className="noscroll">
        <div style={{
          background:'rgba(255,255,255,0.025)',
          borderRadius:14, padding:'8px',
          border:`1px solid ${T.border}`, backdropFilter:'blur(10px)'
        }}>
          {NAV.map((it,i)=> (
            <NavRow key={i} it={it} active={active===i} onClick={()=>setActive(i)}/>
          ))}
        </div>

        <div style={{ marginTop:10, background:'rgba(255,255,255,0.025)',
          borderRadius:14, padding:'8px', border:`1px solid ${T.border}` }}>
          <div style={{ fontSize:9, color:T.textLow, letterSpacing:'0.14em', fontWeight:700, padding:'6px 14px' }}>МІЙ АКАУНТ</div>
          {ACCOUNT.map((it,i)=> (
            <NavRow key={i} it={it} active={active===10+i} onClick={()=>setActive(10+i)}/>
          ))}
        </div>
      </div>

      {/* User card */}
      <div style={{ padding:'12px 14px 8px', position:'relative' }}>
        <div style={{
          padding:'12px 14px',
          borderRadius:12, background:T.surface, border:`1px solid ${T.border}`,
          display:'flex', alignItems:'center', gap:10, cursor:'pointer', transition:'background .15s'
        }}
        onMouseEnter={e=>e.currentTarget.style.background = T.surfaceHigh}
        onMouseLeave={e=>e.currentTarget.style.background = T.surface}>
          <div style={{ position:'relative' }}>
            <Avatar size={34} color="#FF7C0A" initial="Z"/>
            <span style={{ position:'absolute', bottom:-2, right:-2, width:11, height:11, borderRadius:'50%',
              background:T.success, border:`2px solid ${T.surface}` }}></span>
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:5 }}>
              <span style={{ fontSize:13, fontWeight:800, color:'#FF7C0A',
                overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>Zavrikk</span>
              <Tooltip text="Owner — повний контроль" side="top">
                <span style={{ fontSize:11, color:T.tertiary, cursor:'help' }}>★</span>
              </Tooltip>
            </div>
            <div style={{ fontSize:10, color:T.textMid, fontWeight:500 }}>Druid · 281 ilvl</div>
          </div>
          <span className="ms" style={{ fontSize:18, color:T.textLow }}>expand_more</span>
        </div>
      </div>

      {/* Footer: 4-icon toolbar (Discord/Patreon/Feedback/Help) */}
      <FinalFooter/>
    </div>
  );
}

// ───── Language pill (variant A — у шапці) ─────
function LangPill({ lang, setLang }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ position:'relative' }}>
      <button onClick={()=>setOpen(!open)} style={{
        display:'flex', alignItems:'center', gap:4, padding:'4px 8px', borderRadius:14,
        background:'rgba(255,255,255,0.04)', border:`1px solid ${T.border}`,
        color:T.textMid, fontSize:11, fontWeight:700, cursor:'pointer'
      }}>
        <span style={{ fontSize:13 }}>{lang === 'ua' ? '🇺🇦' : '🇬🇧'}</span>
        <span>{lang === 'ua' ? 'UA' : 'EN'}</span>
        <span className="ms" style={{ fontSize:14 }}>arrow_drop_down</span>
      </button>
      {open && (
        <div style={{ position:'absolute', top:'100%', right:0, marginTop:4, zIndex:10,
          background:T.surface, border:`1px solid ${T.borderStrong}`, borderRadius:8,
          padding:4, minWidth:120, boxShadow:'0 6px 20px rgba(0,0,0,0.4)' }}>
          {[{c:'ua', f:'🇺🇦', l:'Українська'}, {c:'en', f:'🇬🇧', l:'English'}].map(o=>(
            <div key={o.c} onClick={()=>{setLang(o.c); setOpen(false);}} style={{
              padding:'7px 10px', borderRadius:5, display:'flex', alignItems:'center', gap:8,
              background: lang===o.c ? 'rgba(79,211,247,0.10)':'transparent',
              color: lang===o.c ? T.primary : T.textHi, fontSize:12, fontWeight:600, cursor:'pointer'
            }}><span>{o.f}</span><span>{o.l}</span></div>
          ))}
        </div>
      )}
    </div>
  );
}

// ───── Footer A: 2 рядки. Інвайт окремо вгорі.  ─────
function FooterA() {
  return (
    <div style={{ padding:'4px 14px 14px', position:'relative' }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:6 }}>
        {[
          { i:'forum',              c:'#5865F2',  s:'Discord', l:'Discord сервер' },
          { i:'volunteer_activism', c:'#F96854',  s:'Patreon', l:'Patreon' },
          { i:'feedback',           c:T.primary,  s:'Фідбек',  l:'Залишити фідбек' },
          { i:'help',               c:T.textMid,  s:'Довідка', l:'Довідка' },
        ].map((it,i)=>(
          <Tooltip key={i} text={it.l} side="top">
            <button style={{
              padding:'10px 6px', borderRadius:10, width:'100%',
              background:`${it.c}10`, border:`1px solid ${it.c}25`,
              color:it.c, cursor:'pointer', display:'flex', flexDirection:'column',
              alignItems:'center', gap:4, transition:'all .15s'
            }}
            onMouseEnter={e=>{ e.currentTarget.style.background = `${it.c}1f`; e.currentTarget.style.borderColor = `${it.c}44`; }}
            onMouseLeave={e=>{ e.currentTarget.style.background = `${it.c}10`; e.currentTarget.style.borderColor = `${it.c}25`; }}>
              <span className="ms" style={{ fontSize:18 }}>{it.i}</span>
              <span style={{ fontSize:8.5, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase' }}>{it.s}</span>
            </button>
          </Tooltip>
        ))}
      </div>
    </div>
  );
}

// ───── Footer B: 5 кнопок 1 ряд + мова як кнопка. Інвайт-icon у віджеті. ─────
function FooterB({ lang, setLang }) {
  const [open, setOpen] = React.useState(false);
  const items = [
    { i:'forum',              c:'#5865F2',  l:'Discord' },
    { i:'volunteer_activism', c:'#F96854',  l:'Patreon' },
    { i:'feedback',           c:T.primary,  l:'Фідбек' },
    { i:'help',               c:T.textMid,  l:'Довідка' },
  ];
  return (
    <div style={{ padding:'4px 14px 14px', position:'relative' }}>
      <div style={{ display:'flex', gap:6 }}>
        {items.map((it,i)=>(
          <Tooltip key={i} text={it.l} side="top">
            <button style={{
              flex:1, padding:'9px', borderRadius:10,
              background:`${it.c}10`, border:`1px solid ${it.c}25`,
              color:it.c, cursor:'pointer', display:'grid', placeItems:'center'
            }}
            onMouseEnter={e=>{ e.currentTarget.style.background = `${it.c}1f`; e.currentTarget.style.borderColor = `${it.c}44`; }}
            onMouseLeave={e=>{ e.currentTarget.style.background = `${it.c}10`; e.currentTarget.style.borderColor = `${it.c}25`; }}>
              <span className="ms" style={{ fontSize:17 }}>{it.i}</span>
            </button>
          </Tooltip>
        ))}
        {/* Lang button */}
        <div style={{ position:'relative' }}>
          <Tooltip text={lang === 'ua' ? 'Мова: Українська' : 'Language: English'} side="top">
            <button onClick={()=>setOpen(!open)} style={{
              padding:'9px 10px', borderRadius:10,
              background:'rgba(255,255,255,0.04)', border:`1px solid ${T.border}`,
              color:T.textHi, cursor:'pointer', display:'flex', alignItems:'center', gap:5,
              fontSize:13, fontWeight:700
            }}>
              <span style={{ fontSize:14 }}>{lang === 'ua' ? '🇺🇦' : '🇬🇧'}</span>
            </button>
          </Tooltip>
          {open && (
            <div style={{ position:'absolute', bottom:'calc(100% + 6px)', right:0, zIndex:10,
              background:T.surface, border:`1px solid ${T.borderStrong}`, borderRadius:8,
              padding:4, minWidth:140, boxShadow:'0 6px 20px rgba(0,0,0,0.5)' }}>
              {[{c:'ua', f:'🇺🇦', l:'Українська'}, {c:'en', f:'🇬🇧', l:'English'}].map(o=>(
                <div key={o.c} onClick={()=>{setLang(o.c); setOpen(false);}} style={{
                  padding:'7px 10px', borderRadius:5, display:'flex', alignItems:'center', gap:8,
                  background: lang===o.c ? 'rgba(79,211,247,0.10)':'transparent',
                  color: lang===o.c ? T.primary : T.textHi, fontSize:12, fontWeight:600, cursor:'pointer'
                }}><span>{o.f}</span><span>{o.l}</span></div>
              ))}
            </div>
          )}
        </div>
      </div>
      <div style={{ marginTop:8, fontSize:9, color:T.textLow, letterSpacing:'0.10em', fontWeight:600,
        textAlign:'center' }}>v 0.4.2 · BlastR © 2026</div>
    </div>
  );
}

// ───── Footer C: 5 кнопок (Discord, Patreon, Feedback, Help, Lang). Інвайт — окрема кнопка над shell ─────
function FooterC({ lang, setLang }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ padding:'4px 14px 14px', position:'relative' }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:5 }}>
        {[
          { i:'forum',              c:'#5865F2',  l:'Discord' },
          { i:'volunteer_activism', c:'#F96854',  l:'Patreon' },
          { i:'feedback',           c:T.primary,  l:'Фідбек' },
          { i:'help',               c:T.textMid,  l:'Довідка' },
        ].map((it,i)=>(
          <Tooltip key={i} text={it.l} side="top">
            <button style={{
              padding:'10px 4px', borderRadius:10, width:'100%',
              background:`${it.c}10`, border:`1px solid ${it.c}25`,
              color:it.c, cursor:'pointer', display:'grid', placeItems:'center'
            }}
            onMouseEnter={e=>{ e.currentTarget.style.background = `${it.c}1f`; e.currentTarget.style.borderColor = `${it.c}44`; }}
            onMouseLeave={e=>{ e.currentTarget.style.background = `${it.c}10`; e.currentTarget.style.borderColor = `${it.c}25`; }}>
              <span className="ms" style={{ fontSize:18 }}>{it.i}</span>
            </button>
          </Tooltip>
        ))}
        {/* Lang */}
        <div style={{ position:'relative' }}>
          <Tooltip text={lang === 'ua' ? 'Мова' : 'Language'} side="top">
            <button onClick={()=>setOpen(!open)} style={{
              padding:'10px 4px', borderRadius:10, width:'100%',
              background:'rgba(252,242,102,0.10)', border:`1px solid rgba(252,242,102,0.25)`,
              color:T.tertiary, cursor:'pointer', display:'grid', placeItems:'center',
              fontSize:11, fontWeight:800, letterSpacing:'0.04em'
            }}>{lang === 'ua' ? 'UA' : 'EN'}</button>
          </Tooltip>
          {open && (
            <div style={{ position:'absolute', bottom:'calc(100% + 6px)', right:0, zIndex:10,
              background:T.surface, border:`1px solid ${T.borderStrong}`, borderRadius:8,
              padding:4, minWidth:140, boxShadow:'0 6px 20px rgba(0,0,0,0.5)' }}>
              {[{c:'ua', f:'🇺🇦', l:'Українська'}, {c:'en', f:'🇬🇧', l:'English'}].map(o=>(
                <div key={o.c} onClick={()=>{setLang(o.c); setOpen(false);}} style={{
                  padding:'7px 10px', borderRadius:5, display:'flex', alignItems:'center', gap:8,
                  background: lang===o.c ? 'rgba(79,211,247,0.10)':'transparent',
                  color: lang===o.c ? T.primary : T.textHi, fontSize:12, fontWeight:600, cursor:'pointer'
                }}><span>{o.f}</span><span>{o.l}</span></div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ───── Final footer: 4 icons only (lang moved to header) ─────
function FinalFooter() {
  return (
    <div style={{ padding:'4px 14px 14px', position:'relative' }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:6 }}>
        {[
          { i:'forum',              c:'#5865F2',  s:'Discord', l:'Discord сервер' },
          { i:'volunteer_activism', c:'#F96854',  s:'Patreon', l:'Patreon' },
          { i:'feedback',           c:T.primary,  s:'Фідбек',  l:'Залишити фідбек' },
          { i:'help',               c:T.textMid,  s:'Довідка', l:'Довідка' },
        ].map((it,i)=>(
          <Tooltip key={i} text={it.l} side="top">
            <button style={{
              padding:'10px 6px', borderRadius:10, width:'100%',
              background:`${it.c}10`, border:`1px solid ${it.c}25`,
              color:it.c, cursor:'pointer', display:'flex', flexDirection:'column',
              alignItems:'center', gap:4, transition:'all .15s'
            }}
            onMouseEnter={e=>{ e.currentTarget.style.background = `${it.c}1f`; e.currentTarget.style.borderColor = `${it.c}44`; }}
            onMouseLeave={e=>{ e.currentTarget.style.background = `${it.c}10`; e.currentTarget.style.borderColor = `${it.c}25`; }}>
              <span className="ms" style={{ fontSize:18 }}>{it.i}</span>
              <span style={{ fontSize:8.5, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase' }}>{it.s}</span>
            </button>
          </Tooltip>
        ))}
      </div>
    </div>
  );
}

// ───── Demo wrapper ─────
function Demo({ variant }) {
  const [active, setActive] = React.useState(0);
  const [lang, setLang] = React.useState('ua');
  return (
    <div style={{
      width:'100%', height:'100%',
      background:T.bg, display:'grid',
      gridTemplateColumns:'272px 1fr', overflow:'hidden'
    }}>
      <Sidebar variant={variant} active={active} setActive={setActive} lang={lang} setLang={setLang}/>
      <div style={{ padding:'32px 40px', color:T.textHi }}>
        <div style={{ fontSize:11, color:T.textLow, letterSpacing:'0.2em', fontWeight:700, marginBottom:8 }}>
          // FINAL · LANG (A) + INVITE (B, enlarged)
        </div>
        <h1 style={{ margin:'0 0 8px', fontSize:24, fontWeight:800, letterSpacing:'-0.02em' }}>
          Sidebar — фінальна збірка
        </h1>
        <p style={{ color:T.textMid, fontSize:13, maxWidth:520, lineHeight:1.6 }}>
          Wordmark <b>BLAST<span style={{color:T.primary}}>R</span></b> повернутий — заголовна R primary з легким glow.
          Клікай по мові й по нав-пунктам — все інтерактивне.
        </p>
      </div>
    </div>
  );
}

function App() {
  // Final combined: lang from A (header pill) + invite from B (in widget, but big with label)
  // Variant "B" with icon-invite path renders the now-enlarged button
  return (
    <Demo variant="finalAB"/>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
