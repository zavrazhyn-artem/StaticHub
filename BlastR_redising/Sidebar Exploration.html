<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<title>BlastR · Sidebar Exploration</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; height:100%; background:#f0eee9; font-family:'Inter', system-ui, sans-serif; color:#2a251f; }
  * { box-sizing: border-box; }
  .ms { font-family:'Material Symbols Outlined'; font-weight:normal; font-style:normal; line-height:1; vertical-align:middle; -webkit-font-feature-settings:'liga'; font-feature-settings:'liga'; }
  .ms-sharp { font-family:'Material Symbols Sharp'; font-weight:500; font-style:normal; line-height:1; vertical-align:middle; }
  /* Hide scrollbar but keep scroll */
  .noscroll::-webkit-scrollbar { display:none; }
  .noscroll { scrollbar-width:none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" data-presets="react">

// Tokens із Tailwind config (MD3 dark)
const T = {
  bg:'#0e0e10', surface:'#19191c', surfaceHigh:'#1f1f22', surfaceLow:'#131315', surfaceVar:'#262528',
  primary:'#4fd3f7', primaryDim:'#3cc5e9', secondary:'#fa7902', tertiary:'#fcf266',
  error:'#ff6e84', success:'#39FF14',
  textHi:'#f9f5f8', textMid:'#adaaad', textLow:'#767577',
  border:'rgba(255,255,255,0.06)', borderStrong:'rgba(255,255,255,0.12)',
};

// ───── Reusable building blocks ─────

function Logo({ size=28, mark='B' }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:6,
      background:`linear-gradient(135deg, ${T.primary} 0%, #14b2d5 100%)`,
      display:'grid', placeItems:'center', color:'#003040',
      fontWeight:800, fontSize:size*0.55, fontFamily:'Inter',
      boxShadow:'0 0 0 1px rgba(79,211,247,0.3), 0 6px 18px rgba(79,211,247,0.18)',
      letterSpacing:'-0.02em'
    }}>{mark}</div>
  );
}

function Tooltip({ children, text }) {
  const [show, setShow] = React.useState(false);
  return (
    <span style={{ position:'relative', display:'inline-flex' }} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
      {children}
      {show && (
        <span style={{
          position:'absolute', left:'calc(100% + 10px)', top:'50%', transform:'translateY(-50%)',
          background:'#000', color:T.textHi, padding:'4px 8px', borderRadius:4, fontSize:11,
          whiteSpace:'nowrap', zIndex:99, border:`1px solid ${T.borderStrong}`
        }}>{text}</span>
      )}
    </span>
  );
}

function Avatar({ size=28, color='#FF7C0A', initial='Z' }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%',
      background:`linear-gradient(135deg, ${color}66, ${color}22)`,
      border:`1.5px solid ${color}aa`,
      display:'grid', placeItems:'center', color, fontSize:size*0.42, fontWeight:700, flexShrink:0
    }}>{initial}</div>
  );
}

// Nav items shared
const NAV = [
  { i:'dashboard',     l:'Огляд' },
  { i:'groups',        l:'Склад',          badge:{type:'count', v:3, c:T.primary} },
  { i:'event',         l:'Розклад',        badge:{type:'next', v:'2д 7г', c:T.tertiary} },
  { i:'sports_esports',l:'Boss Planner' },
  { i:'savings',       l:'Скарбниця',      badge:{type:'alert', v:'!', c:T.error} },
  { i:'analytics',     l:'Аналітика' },
  { i:'shield',        l:'Екіпіровка',     badge:{type:'count', v:2, c:T.secondary} },
];

// ═══════════════════════════════════════════════════════════
// VARIANT A — Refined classic (закінчений базовий підхід)
// ═══════════════════════════════════════════════════════════
function VariantA() {
  return (
    <div style={{ width:'100%', height:'100%', background:T.surfaceLow, borderRight:`1px solid ${T.border}`,
      display:'flex', flexDirection:'column', fontFamily:'Inter', color:T.textHi }}>

      {/* Top: Logo */}
      <div style={{ padding:'18px 16px 10px', display:'flex', alignItems:'center', gap:12 }}>
        <Logo size={32}/>
        <div style={{ display:'flex', flexDirection:'column' }}>
          <div style={{ fontWeight:800, letterSpacing:'0.06em', fontSize:14 }}>BLASTR</div>
          <div style={{ fontSize:9, color:T.textLow, letterSpacing:'0.14em' }}>RAID HUB</div>
        </div>
      </div>

      {/* Static identity card */}
      <div style={{ margin:'4px 12px 12px', padding:'12px 14px', borderRadius:8,
        background:`linear-gradient(135deg, rgba(79,211,247,0.06), rgba(79,211,247,0.02))`,
        border:`1px solid rgba(79,211,247,0.18)` }}>
        <div style={{ fontSize:9, color:T.textLow, letterSpacing:'0.12em', fontWeight:600, marginBottom:3 }}>СТАТІК</div>
        <div style={{ fontWeight:700, fontSize:14, lineHeight:1.2 }}>Характерники</div>
        <div style={{ fontSize:10, color:T.primary, marginTop:3, display:'flex', alignItems:'center', gap:6 }}>
          <span className="ms" style={{ fontSize:12 }}>workspace_premium</span>
          Mythic Progression · 2/9
        </div>
      </div>

      {/* Nav */}
      <nav style={{ flex:1, overflowY:'auto', padding:'0 8px' }} className="noscroll">
        {NAV.map((it, i) => {
          const active = i === 0;
          return (
            <div key={i} style={{
              display:'flex', alignItems:'center', gap:12, padding:'10px 12px', borderRadius:6,
              background: active ? 'rgba(79,211,247,0.10)' : 'transparent',
              color: active ? T.primary : T.textHi,
              borderLeft: active ? `2px solid ${T.primary}` : '2px solid transparent',
              fontSize:13, fontWeight:600, cursor:'pointer', marginBottom:2, transition:'all .12s'
            }}>
              <span className="ms" style={{ fontSize:20, opacity: active ? 1 : 0.75 }}>{it.i}</span>
              <span style={{ flex:1 }}>{it.l}</span>
              {it.badge && (
                it.badge.type === 'alert' ? (
                  <span style={{ width:18, height:18, borderRadius:'50%', background:it.badge.c, color:'#fff',
                    fontSize:10, fontWeight:800, display:'grid', placeItems:'center' }}>{it.badge.v}</span>
                ) : it.badge.type === 'next' ? (
                  <span style={{ fontSize:9, color:it.badge.c, fontFamily:'JetBrains Mono', fontWeight:700, opacity:0.85 }}>{it.badge.v}</span>
                ) : (
                  <span style={{ fontSize:10, padding:'1px 6px', borderRadius:8, background:`${it.badge.c}22`,
                    color:it.badge.c, fontWeight:700 }}>{it.badge.v}</span>
                )
              )}
            </div>
          );
        })}
      </nav>

      {/* Spacer + bottom group */}
      <div style={{ padding:'8px 12px 4px' }}>
        <div style={{ height:1, background:T.border, margin:'0 4px 8px' }}></div>
        <div style={{ fontSize:9, color:T.textLow, letterSpacing:'0.12em', fontWeight:600, padding:'0 8px 6px' }}>МІЙ АКАУНТ</div>
        {[
          { i:'shield_person', l:'Мої персонажі', sub:'4 персонажі' },
          { i:'settings',      l:'Налаштування' },
        ].map((it,i)=>(
          <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'8px 12px', borderRadius:6,
            color:T.textHi, fontSize:12, fontWeight:600, cursor:'pointer', marginBottom:2 }}>
            <span className="ms" style={{ fontSize:18, color:T.textMid }}>{it.i}</span>
            <div style={{ flex:1 }}>
              <div>{it.l}</div>
              {it.sub && <div style={{ fontSize:9, color:T.textLow, fontWeight:500, marginTop:1 }}>{it.sub}</div>}
            </div>
          </div>
        ))}
      </div>

      {/* User card */}
      <div style={{ margin:'8px 12px 12px', padding:'10px 12px', borderRadius:8, background:T.surface,
        border:`1px solid ${T.border}`, display:'flex', alignItems:'center', gap:10 }}>
        <Avatar color="#FF7C0A" initial="Z"/>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:12, fontWeight:700, color:'#FF7C0A', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>Zavrikk</div>
          <div style={{ fontSize:10, color:T.textMid }}>Druid · 281 ilvl</div>
        </div>
        <Tooltip text="Owner">
          <span style={{ width:18, height:18, borderRadius:4, background:'rgba(252,242,102,0.14)',
            color:T.tertiary, fontSize:11, fontWeight:800, display:'grid', placeItems:'center', cursor:'help' }}>★</span>
        </Tooltip>
      </div>

      {/* Footer actions */}
      <div style={{ padding:'8px 12px 12px', display:'flex', gap:6, borderTop:`1px solid ${T.border}` }}>
        {[
          { i:'forum',    l:'Discord' },
          { i:'feedback', l:'Фідбек' },
          { i:'help',     l:'Довідка' },
        ].map((it,i)=>(
          <Tooltip key={i} text={it.l}>
            <button style={{ flex:1, padding:'8px', borderRadius:5, background:'transparent',
              border:`1px solid ${T.border}`, color:T.textMid, cursor:'pointer', display:'grid', placeItems:'center' }}>
              <span className="ms" style={{ fontSize:16 }}>{it.i}</span>
            </button>
          </Tooltip>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// VARIANT B — Tactical / Premium (more "Method Raid Tools" energy)
// ═══════════════════════════════════════════════════════════
function VariantB() {
  return (
    <div style={{ width:'100%', height:'100%', background:'#0a0a0c', borderRight:`1px solid ${T.borderStrong}`,
      display:'flex', flexDirection:'column', fontFamily:'Inter', color:T.textHi, position:'relative' }}>

      {/* Subtle scanline pattern */}
      <div style={{ position:'absolute', inset:0,
        background:'repeating-linear-gradient(180deg, transparent 0 3px, rgba(255,255,255,0.012) 3px 4px)',
        pointerEvents:'none' }}></div>

      {/* Top: monogram + status */}
      <div style={{ padding:'20px 16px 16px', borderBottom:`1px solid ${T.borderStrong}`, position:'relative' }}>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:14 }}>
          <Logo size={36} />
          <div>
            <div style={{ fontWeight:800, letterSpacing:'0.10em', fontSize:15, fontFamily:'JetBrains Mono' }}>BLASTR</div>
            <div style={{ fontSize:8.5, color:T.primary, letterSpacing:'0.20em', fontWeight:700 }}>// COMMAND CENTER</div>
          </div>
        </div>

        {/* Static + countdown */}
        <div style={{ background:`linear-gradient(135deg, rgba(79,211,247,0.08), transparent)`,
          padding:'10px 12px', borderRadius:6, border:`1px solid rgba(79,211,247,0.15)`, position:'relative' }}>
          <div style={{ fontSize:9, color:T.textLow, letterSpacing:'0.14em', fontWeight:700 }}>// АКТИВНИЙ СТАТІК</div>
          <div style={{ fontWeight:800, fontSize:14, marginTop:2 }}>Характерники</div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:8,
            paddingTop:8, borderTop:`1px solid ${T.border}` }}>
            <div>
              <div style={{ fontSize:8, color:T.textLow, letterSpacing:'0.14em' }}>NEXT RAID</div>
              <div style={{ fontFamily:'JetBrains Mono', fontWeight:800, fontSize:13, color:T.tertiary }}>02:07:11</div>
            </div>
            <button style={{ padding:'5px 10px', borderRadius:4, background:T.tertiary, border:'none',
              color:'#1a1a00', fontSize:9, fontWeight:800, letterSpacing:'0.06em', cursor:'pointer' }}>RSVP</button>
          </div>
        </div>
      </div>

      {/* Nav */}
      <nav style={{ flex:1, overflowY:'auto', padding:'12px 8px' }} className="noscroll">
        <div style={{ fontSize:8.5, color:T.textLow, letterSpacing:'0.18em', fontWeight:700, padding:'0 12px 8px' }}>// OPERATIONS</div>
        {NAV.map((it,i)=>{
          const active = i === 0;
          return (
            <div key={i} style={{
              display:'flex', alignItems:'center', gap:12, padding:'10px 12px',
              background: active ? 'rgba(79,211,247,0.08)' : 'transparent',
              color: active ? T.primary : T.textHi,
              borderRight: active ? `2px solid ${T.primary}` : '2px solid transparent',
              fontSize:12, fontWeight:600, cursor:'pointer', position:'relative',
              fontFamily:'JetBrains Mono', letterSpacing:'0.02em'
            }}>
              {active && <span style={{ position:'absolute', left:0, top:0, bottom:0, width:2, background:T.primary }}></span>}
              <span className="ms-sharp" style={{ fontSize:18 }}>{it.i}</span>
              <span style={{ flex:1, textTransform:'uppercase', fontSize:11 }}>{it.l}</span>
              {it.badge && (
                it.badge.type === 'alert' ? (
                  <span style={{ display:'flex', alignItems:'center', gap:4, color:T.error, fontSize:9, fontWeight:800 }}>
                    <span style={{ width:6, height:6, background:T.error, borderRadius:'50%', boxShadow:`0 0 8px ${T.error}` }}></span>
                    ALERT
                  </span>
                ) : it.badge.type === 'next' ? (
                  <span style={{ fontSize:9, color:it.badge.c, fontWeight:700 }}>{it.badge.v}</span>
                ) : (
                  <span style={{ fontSize:9, color:it.badge.c, fontWeight:800 }}>×{it.badge.v}</span>
                )
              )}
            </div>
          );
        })}

        <div style={{ fontSize:8.5, color:T.textLow, letterSpacing:'0.18em', fontWeight:700, padding:'18px 12px 8px' }}>// PERSONAL</div>
        {[
          { i:'shield_person', l:'Персонажі' },
          { i:'settings',      l:'Налашт.' },
        ].map((it,i)=>(
          <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 12px',
            color:T.textMid, fontSize:11, fontWeight:600, cursor:'pointer',
            fontFamily:'JetBrains Mono', letterSpacing:'0.02em', textTransform:'uppercase' }}>
            <span className="ms-sharp" style={{ fontSize:18 }}>{it.i}</span>
            <span>{it.l}</span>
          </div>
        ))}
      </nav>

      {/* Bottom: user */}
      <div style={{ borderTop:`1px solid ${T.borderStrong}`, padding:'12px 16px',
        background:'linear-gradient(180deg, transparent, rgba(79,211,247,0.04))' }}>
        <Tooltip text="Owner — повний контроль">
          <div style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer' }}>
            <div style={{ position:'relative' }}>
              <Avatar color="#FF7C0A" initial="Z"/>
              <span style={{ position:'absolute', bottom:-2, right:-2, width:10, height:10, borderRadius:'50%',
                background:T.success, border:`2px solid #0a0a0c` }}></span>
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:12, fontWeight:700, color:'#FF7C0A' }}>Zavrikk</div>
              <div style={{ fontSize:9, color:T.tertiary, fontFamily:'JetBrains Mono', letterSpacing:'0.06em' }}>★ OWNER · 281 ILVL</div>
            </div>
            <span className="ms" style={{ fontSize:16, color:T.textLow }}>more_vert</span>
          </div>
        </Tooltip>

        <div style={{ display:'flex', gap:4, marginTop:10 }}>
          {[
            { i:'forum',    c:'#5865F2', l:'Discord' },
            { i:'campaign', c:T.primary, l:'Анонс' },
            { i:'help',     c:T.textMid, l:'?' },
          ].map((it,i)=>(
            <Tooltip key={i} text={it.l}>
              <button style={{ flex:1, padding:'7px', borderRadius:4, background:`${it.c}14`,
                border:`1px solid ${it.c}33`, color:it.c, cursor:'pointer', display:'grid', placeItems:'center' }}>
                <span className="ms" style={{ fontSize:15 }}>{it.i}</span>
              </button>
            </Tooltip>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// VARIANT C — Compact + Live signals (інформаційно щільний)
// ═══════════════════════════════════════════════════════════
function VariantC() {
  return (
    <div style={{ width:'100%', height:'100%', background:T.surfaceLow, borderRight:`1px solid ${T.border}`,
      display:'flex', flexDirection:'column', fontFamily:'Inter', color:T.textHi }}>

      {/* Header with logo + collapse */}
      <div style={{ padding:'14px 14px 10px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <Logo size={26} />
          <div style={{ fontWeight:800, fontSize:13, letterSpacing:'0.04em' }}>BLASTR</div>
        </div>
        <button style={{ width:24, height:24, borderRadius:5, background:'transparent', border:'none',
          color:T.textMid, cursor:'pointer', display:'grid', placeItems:'center' }}>
          <span className="ms" style={{ fontSize:18 }}>menu_open</span>
        </button>
      </div>

      {/* Static card with live status */}
      <div style={{ margin:'4px 10px 10px', padding:'10px 12px', borderRadius:8, background:T.surface,
        border:`1px solid ${T.border}` }}>
        <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
          <span style={{ width:7, height:7, borderRadius:'50%', background:T.success,
            boxShadow:`0 0 0 3px rgba(57,255,20,0.18)` }}></span>
          <span style={{ fontSize:9, color:T.success, letterSpacing:'0.10em', fontWeight:700 }}>LIVE · 18 ОНЛАЙН</span>
        </div>
        <div style={{ fontSize:14, fontWeight:700 }}>Характерники</div>
        <div style={{ fontSize:10, color:T.textMid, marginTop:1 }}>Mythic Progression · S2</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:3, marginTop:8 }}>
          {[{l:'T',v:2,m:2,c:'#3b82f6'},{l:'H',v:4,m:4,c:T.success},{l:'M',v:6,m:8,c:T.error},{l:'R',v:6,m:10,c:'#a855f7'}].map((r,i)=>(
            <div key={i} style={{ textAlign:'center' }}>
              <div style={{ fontSize:8, color:T.textLow, letterSpacing:'0.10em', fontWeight:700 }}>{r.l}</div>
              <div style={{ fontSize:11, fontWeight:800, color:r.c, fontFamily:'JetBrains Mono' }}>{r.v}/{r.m}</div>
              <div style={{ height:2, background:'rgba(255,255,255,0.06)', marginTop:2, borderRadius:1 }}>
                <div style={{ width:`${r.v/r.m*100}%`, height:'100%', background:r.c, borderRadius:1 }}></div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Nav */}
      <nav style={{ flex:1, overflowY:'auto', padding:'4px 8px' }} className="noscroll">
        {NAV.map((it,i)=>{
          const active = i === 0;
          return (
            <div key={i} style={{
              display:'flex', alignItems:'center', gap:10, padding:'8px 10px', borderRadius:5,
              background: active ? 'rgba(79,211,247,0.10)' : 'transparent',
              color: active ? T.primary : T.textHi,
              fontSize:12, fontWeight:600, cursor:'pointer', marginBottom:1, position:'relative'
            }}>
              {active && <span style={{ position:'absolute', left:-8, top:6, bottom:6, width:3,
                background:T.primary, borderRadius:'0 2px 2px 0' }}></span>}
              <span className="ms" style={{ fontSize:18, opacity: active ? 1 : 0.65 }}>{it.i}</span>
              <span style={{ flex:1 }}>{it.l}</span>
              {it.badge && (
                it.badge.type === 'alert' ? (
                  <Tooltip text="Скарбниця критична">
                    <span style={{ width:14, height:14, borderRadius:'50%', background:it.badge.c,
                      animation:'pulse 1.5s ease-in-out infinite', boxShadow:`0 0 8px ${it.badge.c}aa` }}></span>
                  </Tooltip>
                ) : it.badge.type === 'next' ? (
                  <Tooltip text="Наступний рейд через">
                    <span style={{ fontSize:9, color:it.badge.c, fontFamily:'JetBrains Mono', fontWeight:700 }}>{it.badge.v}</span>
                  </Tooltip>
                ) : (
                  <span style={{ fontSize:10, fontWeight:700, color:T.textLow }}>{it.badge.v}</span>
                )
              )}
            </div>
          );
        })}
      </nav>

      {/* Bottom — collapsed */}
      <div style={{ borderTop:`1px solid ${T.border}`, padding:'8px' }}>
        {[
          { i:'shield_person', l:'Персонажі', count:4 },
          { i:'settings',      l:'Налаштування' },
        ].map((it,i)=>(
          <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'7px 10px', borderRadius:5,
            color:T.textMid, fontSize:11, fontWeight:600, cursor:'pointer' }}>
            <span className="ms" style={{ fontSize:16 }}>{it.i}</span>
            <span style={{ flex:1 }}>{it.l}</span>
            {it.count && <span style={{ fontSize:9, color:T.textLow }}>{it.count}</span>}
          </div>
        ))}
      </div>

      {/* User chip */}
      <div style={{ padding:'10px 12px', display:'flex', alignItems:'center', gap:10,
        borderTop:`1px solid ${T.border}`, background:T.surface }}>
        <div style={{ position:'relative' }}>
          <Avatar size={30} color="#FF7C0A" initial="Z"/>
          <Tooltip text="Owner">
            <span style={{ position:'absolute', bottom:-2, right:-2, width:14, height:14, borderRadius:'50%',
              background:T.tertiary, border:`2px solid ${T.surface}`, fontSize:8, fontWeight:800, color:'#1a1a00',
              display:'grid', placeItems:'center', cursor:'help' }}>★</span>
          </Tooltip>
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:12, fontWeight:700, color:'#FF7C0A' }}>Zavrikk</div>
