<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<title>BlastR · Dashboard Redesigns</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; height:100%; background:#0e0e10; font-family:'Inter', system-ui, sans-serif; color:#f9f5f8; }
  * { box-sizing: border-box; }
  .ms { font-family:'Material Symbols Rounded'; font-weight:500; line-height:1; vertical-align:middle; -webkit-font-feature-settings:'liga'; font-feature-settings:'liga'; }
  @keyframes pulse { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.4); opacity:0.55; } }
  @keyframes fade { from { opacity:0; } to { opacity:1; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="dashboard/design-canvas.jsx"></script>
<script type="text/babel" src="dashboard/tokens.jsx"></script>
<script type="text/babel" src="dashboard/artboard1-brief.jsx"></script>
<script type="text/babel" src="dashboard/artboard2-hud.jsx"></script>
<script type="text/babel" src="dashboard/artboard3-magazine.jsx"></script>
<script type="text/babel" src="dashboard/artboard4-grid.jsx"></script>
<script type="text/babel" src="dashboard/artboard5-terminal.jsx"></script>
<script type="text/babel" data-presets="react">

function App() {
  return (
    <DesignCanvas>
      <DCSection id="dashboards"
        title="Dashboard · 5 напрямків редизайну"
        subtitle="Усі beat'и ТЗ: hero = boss progression, секція 'Я', досягнення статіку, склад (T/H/DD), наступна подія, логістика, sync-бейджі → модалка. Натисни ⤢ щоб відкрити фуллскрін.">

        <DCArtboard id="ab1" label="1 · Operations Brief — editorial / військовий брифінг" width={1280} height={900}>
          <ArtboardOperationsBrief/>
        </DCArtboard>

        <DCArtboard id="ab2" label="2 · Tactical HUD — game-UI, концентричні кільця" width={1280} height={900}>
          <ArtboardTacticalHUD/>
        </DCArtboard>

        <DCArtboard id="ab3" label="3 · Magazine — постер-hero, кінематограф" width={1280} height={900}>
          <ArtboardMagazine/>
        </DCArtboard>

        <DCArtboard id="ab4" label="4 · Card Grid 2.0 — як зараз, але правильно (safe)" width={1280} height={900}>
          <ArtboardCardGrid/>
        </DCArtboard>

        <DCArtboard id="ab5" label="5 · Data Terminal — Bloomberg-style, info-dense" width={1280} height={900}>
          <ArtboardDataTerminal/>
        </DCArtboard>

      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
