    name: 'Twilight Bond'
    icon: ~
    school: shadow
    trigger: tether
    priority: medium
    recommended_response: {  }
    notes: 'Invisible health bond between Vaelgor and Ezzorak; if their HP differs by more than 10%, the lower boss heals and the raid takes escalating damage. Balance DPS between both bosses.'
    notes_uk: "Невидимий зв'язок здоров'я між Vaelgor та Ezzorak; якщо їх HP відрізняється більш ніж на 10%, бос з меншим HP лікується, і рейд отримує зростаючу шкоду. Збалансуйте DPS між обома босами."
